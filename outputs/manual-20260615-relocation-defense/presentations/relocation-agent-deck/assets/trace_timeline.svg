  <text x="68" y="118" fill="#5B6473" font-family="Aptos, Arial" font-size="17">Москва, 07.07.2026, 200 000 ₽, 1 взрослый, квартира. OpenRouter active; final answer finished with clarification fallback.</text>

  <text x="68" y="188" fill="#0F172A" font-family="Aptos, Arial" font-size="19" font-weight="700">общий run</text>
